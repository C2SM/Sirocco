---
start_date: &root_start_date '2025-01-01T00:00'
stop_date: &root_stop_date '2027-01-01T00:00'
scheduler: slurm
cycles:
  - init:
      tasks:
        - extpar:
            inputs:
              obs: [obs_data]
            outputs:
              out: [extpar_file]
  - icon_bimonthly:
      cycling:
        start_date: *root_start_date
        stop_date: *root_stop_date
        period: 'P2M'
      tasks:
        - preproc:
            inputs:
              grid: [grid_file]
              extpar: [extpar_file]
              era: [ERA5]
            outputs:
              ini_cond: [icon_input]
            wait_on:
              - icon:
                  when:
                    after: '2025-03-01T00:00'
                  target_cycle:
                    lag: '-P4M'
        - icon:
            inputs:
              grid: [grid_file]
              lbc: [icon_input]
              restart_file:
                - icon_restart:
                    when:
                      after: *root_start_date
                    target_cycle:
                      lag: '-P2M'
            outputs:
              output_streams: [stream_1, stream_2]
              latest_restart_file: [icon_restart]
        - postproc_1:
            inputs:
              dummy: [stream_1]
            outputs:
              processed: [postout_1]
        - store_and_clean_1:
            inputs:
              postout: [postout_1]
              streams: [stream_1]
              icon_input: [icon_input]
            outputs:
              archive: [stored_data_1]
  - yearly:
      cycling:
        start_date: *root_start_date
        stop_date: *root_stop_date
        period: 'P1Y'
      tasks:
        - postproc_2:
            inputs:
              streams:
                - stream_2:
                    target_cycle:
                      lag: ['P0M', 'P2M', 'P4M', 'P6M', 'P8M', 'P10M']
            outputs:
              processed: [postout_2]
        - store_and_clean_2:
            inputs:
              postout: [postout_2]
              streams:
                - stream_2:
                    target_cycle:
                      lag: ['P0M', 'P2M', 'P4M', 'P6M', 'P8M', 'P10M']
            outputs:
              archive: [stored_data_2]
# Each task and piece of data (input and output of tasks) used to
# define the graph is described in that section
tasks:
  - ROOT:
      # All tasks inherit the root task properties
      computer: remote
  - extpar:
      plugin: shell
      computer: remote
      path: scripts/extpar
      command: "extpar --verbose --in {PORT::obs} --out {PORT::out}"
      nodes: 1
      ntasks_per_node: 1
      cpus_per_task: 1
      mem: 1024
      walltime: 00:02:00
  - preproc:
      plugin: shell
      computer: remote
      path: scripts/cleanup.sh
      command: "bash cleanup.sh -p {PORT::extpar} -e {PORT::era} -g {PORT::grid} {PORT::ini_cond}"
      nodes: 4
      ntasks_per_node: 1
      cpus_per_task: 1
      mem: 1024
      walltime: 00:02:00
  - icon:
      plugin: icon
      computer: remote
      bin: /TESTS_ROOTDIR/tests/cases/large/config/ICON/bin/icon
      namelists:
        - ./ICON/icon_master.namelist:
            master_time_control_nml:
              checkpointtimeintval: 'P2M'
        - ./ICON/NAMELIST_exclaim_ape_R02B04:
            parallel_nml:
              nproma: 96
            output_nml[1]:
              output_filename: atm_2d
      nodes: 40
      ntasks_per_node: 1
      cpus_per_task: 1
      walltime: 23:59:59
      uenv: icon/25.2:v3
  - postproc_1:
      plugin: shell
      computer: remote
      path: scripts/main_script_ocn.sh
      command: "bash main_script_ocn.sh {PORT::None}"
      nodes: 2
      ntasks_per_node: 1
      cpus_per_task: 1
      walltime: 00:05:00
  - postproc_2:
      plugin: shell
      computer: remote
      command: "bash main_script_atm.sh --input {PORT::streams}"
      multi_arg_sep: ","
      nodes: 2
      ntasks_per_node: 1
      cpus_per_task: 1
      walltime: 00:05:00
  - store_and_clean_1:
      plugin: shell
      computer: remote
      path: scripts/post_clean.sh
      command: "bash post_clean.sh --processed={PORT::postout} --original={PORT::streams} --input={PORT::icon_input} --archive{PORT::archive}"
      nodes: 1
      ntasks_per_node: 1
      cpus_per_task: 1
      walltime: 00:01:00
  - store_and_clean_2:
      plugin: shell
      computer: remote
      path: scripts/post_clean.sh
      command: "bash post_clean.sh --processed={PORT::postout} --original={PORT::clean} --archive{PORT::archive}"
      nodes: 1
      ntasks_per_node: 1
      cpus_per_task: 1
      walltime: 00:01:00
data:
  available:
    - grid_file:
        computer: remote
        path: /TESTS_ROOTDIR/tests/cases/large/config/data/grid
    - obs_data:
        computer: remote
        path: /TESTS_ROOTDIR/tests/cases/large/config/data/obs_data
    - ERA5:
        computer: remote
        path: /TESTS_ROOTDIR/tests/cases/large/config/data/era5
  generated:
    - extpar_file:
        path: output
    - icon_input:
        path: output
    - icon_restart:
        format: ncdf
        path: restart
    - stream_1:
        path: output_1
    - stream_2:
        path: output_2
    - postout_1:
        path: postout
    - postout_2:
        path: postout
    - stored_data_1:
        path: stored_data
    - stored_data_2:
        path: stored_data
