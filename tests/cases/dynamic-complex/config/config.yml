---
# Complex multi-branch test case with cross-dependencies
# This tests:
# - 3 branches with different speeds (fast, medium, slow)
# - Cross-dependencies between branches
# - Multiple cycles with inter-cycle dependencies
# - Convergence points where all branches sync
# - Dynamic level computation with complex dependency graphs
name: dynamic_deps_complex
start_date: &cycle_start '2026-01-01T00:00'
stop_date: &cycle_stop '2026-03-01T00:00'
front_depth: 2

cycles:
  # Initialization cycle (runs once)
  - init:
      tasks:
        - setup:
            outputs:
              dummy: [setup_data]

  # Main processing cycle (runs monthly for 3 iterations)
  - main:
      cycling:
        start_date: *cycle_start
        stop_date: *cycle_stop
        period: P1M  # Monthly
      tasks:
        # ============================================================
        # FAST BRANCH
        # ============================================================
        - fast_1:
            inputs:
              setup_in: [setup_data]
            outputs:
              dummy: [fast_1_out]

        - fast_2:
            inputs:
              fast_1_data: [fast_1_out]
            outputs:
              dummy: [fast_2_out]

        - fast_3:
            inputs:
              fast_2_data: [fast_2_out]
            outputs:
              dummy: [fast_3_out]

        # ============================================================
        # MEDIUM BRANCH (20s tasks, depends on fast branch)
        # ============================================================
        - medium_1:
            inputs:
              setup_in: [setup_data]
            outputs:
              dummy: [medium_1_out]

        # Cross-dependency: medium_2 waits for BOTH medium_1 AND fast_2
        - medium_2:
            inputs:
              medium_1_data: [medium_1_out]
              fast_trigger: [fast_2_out]
            outputs:
              dummy: [medium_2_out]

        - medium_3:
            inputs:
              medium_2_data: [medium_2_out]
            outputs:
              dummy: [medium_3_out]

        # ============================================================
        # SLOW BRANCH
        # ============================================================
        - slow_1:
            inputs:
              setup_in: [setup_data]
            outputs:
              dummy: [slow_1_out]

        # Cross-dependency: slow_2 waits for BOTH slow_1 AND medium_2
        - slow_2:
            inputs:
              slow_1_data: [slow_1_out]
              medium_trigger: [medium_2_out]
            outputs:
              dummy: [slow_2_out]

        - slow_3:
            inputs:
              slow_2_data: [slow_2_out]
            outputs:
              dummy: [slow_3_out]

        # ============================================================
        # CONVERGENCE POINT (waits for all branches)
        # ============================================================
        - finalize:
            inputs:
              fast_final: [fast_3_out]
              medium_final: [medium_3_out]
              slow_final: [slow_3_out]
            outputs:
              dummy: [cycle_complete]

        # ============================================================
        # INTER-CYCLE DEPENDENCY (optional, for next cycle)
        # ============================================================
        - prepare_next:
            inputs:
              prev_cycle: [cycle_complete]
              # Reference to previous cycle's output
              prev_cycle_ref:
                - cycle_complete:
                    when:
                      after: '2026-01-01T00:00'
                    target_cycle:
                      lag: '-P1M'
            outputs:
              dummy: [next_cycle_data]

tasks:

  - ROOT:
      computer: "{{ SIROCCO_COMPUTER }}"
      account: "{{ SLURM_ACCOUNT }}"
      partition: "{{ SLURM_QUEUE }}"

  # Init cycle
  - setup:
      plugin: shell
      path: "{{ SIROCCO_SCRIPTS_DIR }}/fast_task.sh"
      command: "bash fast_task.sh setup {{ FAST_TIME }}"
      walltime: 00:30:00

  # Fast branch tasks
  - fast_1:
      plugin: shell
      path: "{{ SIROCCO_SCRIPTS_DIR }}/fast_task.sh"
      command: "bash fast_task.sh fast_1 {{ FAST_TIME }}"
      walltime: 00:30:00

  - fast_2:
      plugin: shell
      path: "{{ SIROCCO_SCRIPTS_DIR }}/fast_task.sh"
      command: "bash fast_task.sh fast_2 {{ FAST_TIME }}"
      walltime: 00:30:00

  - fast_3:
      plugin: shell
      path: "{{ SIROCCO_SCRIPTS_DIR }}/fast_task.sh"
      command: "bash fast_task.sh fast_3 {{ FAST_TIME }}"
      walltime: 00:30:00

  # Medium branch tasks
  - medium_1:
      plugin: shell
      path: "{{ SIROCCO_SCRIPTS_DIR }}/medium_task.sh"
      command: "bash medium_task.sh medium_1 {{ MEDIUM_TIME }}"
      walltime: 00:30:00

  - medium_2:
      plugin: shell
      path: "{{ SIROCCO_SCRIPTS_DIR }}/medium_task.sh"
      command: "bash medium_task.sh medium_2 {{ MEDIUM_TIME }}"
      walltime: 00:30:00

  - medium_3:
      plugin: shell
      path: "{{ SIROCCO_SCRIPTS_DIR }}/medium_task.sh"
      command: "bash medium_task.sh medium_3 {{ MEDIUM_TIME }}"
      walltime: 00:30:00

  # Slow branch tasks
  - slow_1:
      plugin: shell
      path: "{{ SIROCCO_SCRIPTS_DIR }}/slow_task.sh"
      command: "bash slow_task.sh slow_1 {{ SLOW_TIME }}"
      walltime: 00:30:00

  - slow_2:
      plugin: shell
      path: "{{ SIROCCO_SCRIPTS_DIR }}/slow_task.sh"
      command: "bash slow_task.sh slow_2 {{ SLOW_TIME }}"
      walltime: 00:30:00

  - slow_3:
      plugin: shell
      path: "{{ SIROCCO_SCRIPTS_DIR }}/slow_task.sh"
      command: "bash slow_task.sh slow_3 {{ SLOW_TIME }}"
      walltime: 00:30:00

  # Convergence and inter-cycle
  - finalize:
      plugin: shell
      path: "{{ SIROCCO_SCRIPTS_DIR }}/fast_task.sh"
      command: "bash fast_task.sh finalize {{ FAST_TIME }}"
      walltime: 00:30:00

  - prepare_next:
      plugin: shell
      path: "{{ SIROCCO_SCRIPTS_DIR }}/fast_task.sh"
      command: "bash fast_task.sh prepare_next {{ FAST_TIME }}"
      walltime: 00:30:00

data:
  generated:
    # Init cycle
    - setup_data:
        path: setup_output

    # Fast branch outputs
    - fast_1_out:
        path: fast_1_output
    - fast_2_out:
        path: fast_2_output
    - fast_3_out:
        path: fast_3_output

    # Medium branch outputs
    - medium_1_out:
        path: medium_1_output
    - medium_2_out:
        path: medium_2_output
    - medium_3_out:
        path: medium_3_output

    # Slow branch outputs
    - slow_1_out:
        path: slow_1_output
    - slow_2_out:
        path: slow_2_output
    - slow_3_out:
        path: slow_3_output

    # Convergence outputs
    - cycle_complete:
        path: finalize_output
    - next_cycle_data:
        path: prepare_next_output
