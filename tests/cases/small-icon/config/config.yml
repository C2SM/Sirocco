---
start_date: &root_start_date '2026-01-01T00:00'
stop_date: &root_stop_date '2026-06-01T00:00'
scheduler: slurm
cycles:
  - bimonthly_tasks:
      cycling:
        start_date: *root_start_date
        stop_date: *root_stop_date
        period: P2M
      tasks:
        - icon:
            components:
              atm:
                inputs:
                  ecrad_data: [ecrad_data]
                  cloud_opt_props: [ECHAM6_CldOptProps]
                  rrtmg_sw: [rrtmg_sw]
                  dynamics_grid_file: [icon_grid_simple]
                  dmin_wetgrowth_lookup: [dmin_wetgrowth_lookup]
                  restart_file:
                    - restart:
                        when:
                          after: *root_start_date
                        target_cycle:
                          lag: -P2M
                outputs:
                  finish_status: [finish]
                  latest_restart_file: [restart]
  - lastly:
      tasks:
        - cleanup:
            inputs:
              dummy:
                - restart:
                    target_cycle:
                      date: 2026-05-01T00:00
tasks:
  - icon:
      plugin: icon
      computer: remote
      bin: /TESTS_ROOTDIR/tests/cases/small-icon/config/ICON/bin/icon
      namelists:
        - ./ICON/icon_master.namelist
        - ./ICON/model.namelist
      mpi_cmd: "mpirun -np {MPI_TOTAL_PROCS}"
      walltime: 00:05:00
      nodes: 1
      ntasks_per_node: 1
      cpus_per_task: 1
      wrapper_script: scripts/dummy_wrapper.sh
      uenv: "icon-wcp/v1:rc4" 
      view: "icon"
  - cleanup:
      plugin: shell
      computer: remote
      path: scripts/cleanup.py
      command: "python cleanup.py {PORT::dummy}"
      mpi_cmd: "mpirun -np {MPI_TOTAL_PROCS}"
      walltime: 00:05:00
      nodes: 1
      ntasks_per_node: 1
      cpus_per_task: 1
data:
  available:
     - icon_grid_simple:
         path: /TESTS_ROOTDIR/tests/cases/small-icon/config/ICON/icon_grid_simple.nc
         computer: remote
     - ecrad_data:
         path: /TESTS_ROOTDIR/tests/cases/small-icon/config/ICON/ecrad_data
         computer: remote
     - ECHAM6_CldOptProps:
         path: /TESTS_ROOTDIR/tests/cases/small-icon/config/ICON/ECHAM6_CldOptProps.nc
         computer: remote
     - rrtmg_sw:
         path: /TESTS_ROOTDIR/tests/cases/small-icon/config/ICON/rrtmg_sw.nc
         computer: remote
     - dmin_wetgrowth_lookup:
         path: /TESTS_ROOTDIR/tests/cases/small-icon/config/ICON/dmin_wetgrowth_lookup.nc
         computer: remote
  generated:
     - finish: {}
     - restart: {}
